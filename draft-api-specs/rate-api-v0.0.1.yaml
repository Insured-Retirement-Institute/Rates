openapi: 3.1.0
info:
  title: IRI Rate API
  version: 0.0.1
  description: |
    ## IRI Rate API

    The Rate API transmits current and upcoming rate values for annuity products so that
    downstream workflows can consume consistent, interoperable rate data without maintaining
    carrier-specific translation logic.

    ### Two-API Design

    The Rate API works in conjunction with the **Product Dictionary API**:

    - **Product Dictionary API** — provides stable identifiers and reference data for products,
      surrender periods, premium bands, strategies, and features. Consumers onboard strategy
      definitions once using this API.
    - **Rate API** — transmits the economic parameters (rate values) associated with those
      previously identified strategies. It does not re-transmit structural or definitional data.

    ### Strategy Representation Standard

    Rate payloads represent strategies as a collection of typed `components`, each carrying a
    decimal `value`. The approved component types, valid combinations, and the canonical
    representation for each strategy design are governed by the
    **Strategy Representation Standard**.

    Key principles:

    - **Minimal Economic Representation** — only parameters that appear on a carrier's
      published rate sheet belong in the Rates API. Underliers, crediting methods, observation
      schedules, and payoff formulas are intentionally excluded.
    - **Canonical Representation** — every strategy type has exactly one approved component
      combination. Carriers may not substitute alternative combinations, even if economically
      equivalent.
    - **Governed Evolution** — new strategy designs are approved by the governance committee
      before they may be used. Once approved, the representation is canonical for all carriers
      offering that payoff structure.

    See [Strategy Representation Standard](./docs/strategy-representation-standard.md) for the
    full governance document, component type reference, and Approved Strategy Representation
    Catalog.
externalDocs:
  description: Strategy Representation Standard
  url: ./docs/strategy-representation-standard.md
paths:
  /v1/product-dictionary:
    get:
      description: Returns a paginated list of all products in the dictionary.
      operationId: ListProducts
      parameters:
      - name: idSource
        in: query
        description: Return only products with this idSource (e.g. CUSIP).
        schema:
          type: string
          description: Return only products with this idSource (e.g. CUSIP).
      - name: offset
        in: query
        description: Zero-based offset of the first item to return (default 0).
        schema:
          type: number
          description: Zero-based offset of the first item to return (default 0).
      - name: limit
        in: query
        description: Maximum number of items to return per page (default 50).
        schema:
          type: number
          description: Maximum number of items to return per page (default 50).
      - name: correlationId
        in: header
        description: Optional correlation identifier for cross-system tracing.
        schema:
          type: string
          description: Optional correlation identifier for cross-system tracing.
      responses:
        '200':
          description: ListProducts 200 response
          headers:
            correlationId:
              description: Echoed correlation identifier from the request.
              schema:
                type: string
                description: Echoed correlation identifier from the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProductsResponseContent'
        '400':
          description: ClientError 400 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ForbiddenError 403 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: NotFoundError 404 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ServerError 500 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/product-dictionary/{id}:
    get:
      description: Returns a single product by its internal id.
      operationId: GetProduct
      parameters:
      - name: id
        in: path
        schema:
          type: string
        required: true
      - name: correlationId
        in: header
        description: Optional correlation identifier for cross-system tracing.
        schema:
          type: string
          description: Optional correlation identifier for cross-system tracing.
      responses:
        '200':
          description: GetProduct 200 response
          headers:
            correlationId:
              description: Echoed correlation identifier from the request.
              schema:
                type: string
                description: Echoed correlation identifier from the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductResponseContent'
        '400':
          description: ClientError 400 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ForbiddenError 403 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: NotFoundError 404 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ServerError 500 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/product-rates/{id}:
    get:
      description: 'Returns rate information for a single product identified by its id.

        Use the product dictionary endpoints to resolve surrender period, premium band,
        and strategy identifiers in the response.


        All query parameters accept a single value only. If a query parameter is

        repeated (e.g. `?scope=NEW_BUSINESS&scope=GMIR`), the server will reject

        the request with a 400 ValidationError. Clients must supply at most one

        value per parameter.'
      operationId: GetProductRate
      parameters:
      - name: id
        in: path
        description: Product identifier from the product dictionary.
        schema:
          type: string
          description: Product identifier from the product dictionary.
        required: true
      - name: scope
        in: query
        description: Rate scope to retrieve (e.g. newBusiness, gmir). Single value only.
        schema:
          $ref: '#/components/schemas/RateScope'
      - name: effectiveDate
        in: query
        description: 'Effective date filter (yyyy-MM-dd). Returns the rate effective on this date.

          Single value only.'
        schema:
          type: string
          format: date
          description: 'Effective date filter (yyyy-MM-dd). Returns the rate effective on this date.

            Single value only.'
      - name: correlationId
        in: header
        description: Optional correlation identifier for cross-system tracing.
        schema:
          type: string
          description: Optional correlation identifier for cross-system tracing.
      responses:
        '200':
          description: GetProductRate 200 response
          headers:
            correlationId:
              description: Echoed correlation identifier from the request.
              schema:
                type: string
                description: Echoed correlation identifier from the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductRateResponseContent'
        '400':
          description: ClientError 400 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: ForbiddenError 403 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: NotFoundError 404 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: ServerError 500 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ComponentType:
      type: string
      description: |
        Crediting strategy component type. Values are expressed as decimals (0.10 = 10%).
        A value of 9999 means uncapped/infinite.

        **Strategy Components** — define the performance ceiling or participation:
        - `cap` — cap rate; maximum return limit
        - `participation` — participation rate; percentage of index gain credited
        - `spread` — spread rate; deduction from index return
        - `fixed` — fixed rate; guaranteed credit independent of index performance
        - `performanceTrigger` — trigger level for threshold-based crediting
        - `tier` — tier threshold; used in approved tiered representations

        **Downside Protection Components** — define loss protection:
        - `buffer` — percentage of loss absorbed before client exposure begins
        - `floor` — maximum permitted loss over the term (positive decimal, e.g. 0.20 = -20% floor)
        - `barrier` — downside threshold beyond which losses are incurred
        - `downsideParticipation` — percentage of index loss applied to the client

        **Miscellaneous Components**:
        - `annualFee` — annual strategy fee (e.g. 0.01 = 1.00% annual fee)

        **Conventions**:
        - The absence of any downside component implies full downside protection.
        - For a fully unprotected strategy use `downsideParticipation` with value = 1.
        - Approved component combinations per strategy type are defined in the Strategy
          Representation Standard.
      externalDocs:
        description: Strategy Representation Standard — component types and approved catalog
        url: ./docs/strategy-representation-standard.md
      enum:
      - cap
      - participation
      - spread
      - fixed
      - performanceTrigger
      - tier
      - buffer
      - floor
      - barrier
      - downsideParticipation
      - annualFee
    ErrorResponse:
      type: object
      description: Standard error response body per IRI Digital-First-Specifications.
      properties:
        httpStatus:
          type: number
          description: Numeric HTTP status code (400–599).
        code:
          type: string
          description: 'Machine-readable structured identifier in domain.category.subcategory format

            (e.g. "rates.validation.missingField").'
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error was generated.
        correlationId:
          type: string
          description: Carries forward the inbound request's correlationId for cross-system tracing.
        message:
          type: string
          description: Developer-focused technical explanation.
        userMessage:
          type: string
          description: End-user-friendly explanation, safe to display in portals.
      required:
      - code
      - correlationId
      - httpStatus
      - message
      - timestamp
      - userMessage
    Feature:
      type: object
      description: An optional rider or product feature (e.g. "GWBL Rider").
      properties:
        id:
          type: string
          description: Stable identifier referenced by rate payloads.
        displayName:
          type: string
          description: Human-readable feature / rider name.
        effectiveDate:
          type: string
          format: date
          description: Date the feature became available (yyyy-MM-dd).
        expiryDate:
          type: string
          format: date
          description: Date the feature is no longer available (yyyy-MM-dd). Absent means open-ended.
        applicableJurisdictions:
          type: array
          items:
            type: string
            pattern: ^[A-Z]{2}-[A-Z0-9]{1,3}$
            description: ISO 3166-2 jurisdiction code — always country + subdivision (e.g. "US-CA", "US-TX").
          description: 'ISO 3166-2 jurisdiction codes in which the feature is available.

            When absent the feature is available in all jurisdictions.'
      required:
      - displayName
      - effectiveDate
      - id
    GetProductResponseContent:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
      required:
      - product
    GetProductRateResponseContent:
      type: object
      properties:
        rates:
          type: array
          items:
            $ref: '#/components/schemas/ProductRate'
          minItems: 1
      required:
      - rates
    IdSource:
      type: string
      description: Source system that minted a product identifier.
      enum:
      - cusip
      - internal
    ListProductsResponseContent:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          minItems: 1
        metadata:
          $ref: '#/components/schemas/PaginationMetadata'
      required:
      - metadata
      - products
    PaginationMetadata:
      type: object
      description: Offset-based pagination metadata included in list responses.
      properties:
        offset:
          type: number
          description: Zero-based offset of the first item in the current page.
        limit:
          type: number
          description: Maximum number of items requested for this page.
        nextOffset:
          type: number
          description: Offset to use for the next page. Absent when there are no more pages.
        totalCount:
          type: number
          description: Total number of items across all pages. May be absent if the total is unknown.
      required:
      - limit
      - offset
    PremiumBand:
      type: object
      description: 'A premium-amount tier that qualifies a contract into a specific rate band.


        Invariants (enforced by the server, not the schema):

        - `premiumFrom` of each band must be strictly greater than `premiumTo` of the previous band.

        - No two bands may share an overlapping premium range.

        - Together the bands should cover the full intended premium range without gaps.'
      properties:
        id:
          type: string
          description: Stable identifier referenced by rate payloads.
        premiumFrom:
          type: number
          description: Minimum premium (inclusive) required to qualify for this band.
          format: double
        premiumTo:
          type: number
          description: 'Maximum premium (inclusive) for this band.

            When absent there is no upper limit.'
          format: double
      required:
      - id
      - premiumFrom
    Product:
      type: object
      description: Full product record as stored in the product dictionary.
      properties:
        id:
          type: string
          description: Internal stable identifier for this product record.
        idSource:
          $ref: '#/components/schemas/IdSource'
        displayName:
          type: string
          description: Human-readable product name.
        variationId:
          type: string
          description: Populated only when this record is a variation of a generic product.
        associatedFirmCode:
          type: string
          description: DTCC member code identifying a distributor-specific variation.
        associatedFirmName:
          type: string
          description: Human-readable name of the DTCC member / distributor.
        effectiveDate:
          type: string
          format: date
          description: Date the product became available for new business (yyyy-MM-dd).
        expiryDate:
          type: string
          format: date
          description: 'Date after which the product is no longer available for new business (yyyy-MM-dd).

            Absent means open-ended.'
        applicableJurisdictions:
          type: array
          items:
            type: string
            pattern: ^[A-Z]{2}-[A-Z0-9]{1,3}$
            description: ISO 3166-2 jurisdiction code — always country + subdivision (e.g. "US-CA", "US-TX").
          description: 'ISO 3166-2 jurisdiction codes in which the product is available.

            When absent the product is assumed available in all jurisdictions.'
        surrenderPeriods:
          type: array
          items:
            $ref: '#/components/schemas/SurrenderPeriod'
          minItems: 1
        premiumBands:
          type: array
          items:
            $ref: '#/components/schemas/PremiumBand'
          minItems: 1
        strategies:
          type: array
          items:
            $ref: '#/components/schemas/Strategy'
          minItems: 1
        features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'
      required:
      - displayName
      - effectiveDate
      - id
      - idSource
      - premiumBands
      - strategies
      - surrenderPeriods
    ProductRate:
      type: object
      description: 'A rate entry for a single product covering one or more surrender period /

        premium band combinations and their associated strategy components.'
      properties:
        id:
          type: string
          description: Product identifier. The source system is indicated by idSource.
        idSource:
          $ref: '#/components/schemas/RateIdSource'
        variationId:
          type: string
          description: Distributor- or carrier-specific product variation identifier.
        rateVariationId:
          type: string
          description: Firm-specific rate variation identifier (e.g. a firm override identifier).
        scope:
          $ref: '#/components/schemas/RateScope'
        effectiveDate:
          type: string
          format: date
          description: Date the rate takes effect in the market (yyyy-MM-dd).
        expiryDate:
          type: string
          format: date
          description: 'Date the rate is no longer available.

            If absent, the rate is valid until a new one is published or received.'
        sweepDate:
          type: string
          format: date
          description: 'Date funds allocated to a strategy begin earning interest.

            If absent, assumed equal to effectiveDate.'
        publishingDate:
          type: string
          format: date
          description: Date a future rate may be publicized as upcoming.
        created:
          type: string
          format: date-time
          description: Timestamp when this rate entry was created. For downstream change tracking.
        modified:
          type: string
          format: date-time
          description: Timestamp when this rate entry was last modified. For downstream change tracking.
        rates:
          type: array
          items:
            $ref: '#/components/schemas/RateGroup'
          minItems: 1
          description: 'Rate values grouped by surrender period and premium band combinations.

            Each group contains the strategies and their component rates.'
      required:
      - created
      - effectiveDate
      - id
      - idSource
      - modified
      - rates
      - scope
    RateComponent:
      type: object
      description: |
        A single rate component — the atomic unit of strategy rate transmission.

        Values are expressed as decimals (0.25 = 25%). A value of 9999 means uncapped.
        The absence of a downside component implies full downside protection.

        The set of components for a strategy must match the approved combination defined
        in the Strategy Representation Standard. Carriers may not substitute alternative
        component combinations, even if economically equivalent. See the
        [Approved Strategy Representation Catalog](./docs/strategy-representation-standard.md#approved-strategy-representation-catalog)
        for the canonical representation of each strategy type.
      properties:
        type:
          $ref: '#/components/schemas/ComponentType'
        value:
          type: number
          description: Rate value as a decimal. 9999 = uncapped/infinite.
          format: double
      required:
      - type
      - value
    RateGroup:
      type: object
      description: 'A grouping of strategies keyed by a specific surrender period and premium band.

        Both identifiers are defined in the product dictionary.'
      properties:
        bandId:
          type: string
          description: Premium band identifier from the product dictionary.
        surrenderPeriodId:
          type: string
          description: Surrender period identifier from the product dictionary.
        strategies:
          type: array
          items:
            $ref: '#/components/schemas/RateStrategy'
          minItems: 1
          description: Strategies and their rate components for this band/period combination.
      required:
      - bandId
      - strategies
      - surrenderPeriodId
    RateIdSource:
      type: string
      description: Source system for the product identifier in a rate entry.
      enum:
      - productDictionary
      - acord
    RateScope:
      type: string
      description: Scope of the rate being communicated.
      enum:
      - newBusiness
      - gmir
      - bailout
    RateStrategy:
      type: object
      description: |
        A strategy within a rate group, identified by its product dictionary id,
        with optional jurisdiction scoping and an associated feature.

        The `components` array must contain exactly the approved component combination for
        this strategy's type as defined in the Strategy Representation Standard. No
        substitutions are permitted — canonical representation is required for
        industry-wide interoperability.
      properties:
        id:
          type: string
          description: Strategy identifier from the product dictionary.
        applicableJurisdictions:
          type: array
          items:
            type: string
            pattern: ^[A-Z]{2}-[A-Z0-9]{1,3}$
            description: ISO 3166-2 jurisdiction code — always country + subdivision (e.g. "US-CA", "US-TX").
          description: 'ISO 3166-2 jurisdictions this strategy rate applies to.

            If absent, applies to all jurisdictions.'
        featureIds:
          type: array
          items:
            type: string
          description: Optional feature identifiers (e.g. riders) associated with this strategy rate.
        components:
          type: array
          items:
            $ref: '#/components/schemas/RateComponent'
          minItems: 1
          description: Rate components that define the strategy's performance parameters.
      required:
      - components
      - id
    Strategy:
      type: object
      description: A crediting strategy available on the product (e.g. "1-Year Point-to-Point").
      properties:
        id:
          type: string
          description: Stable identifier referenced by rate payloads.
        displayName:
          type: string
          description: Human-readable strategy name.
        effectiveDate:
          type: string
          format: date
          description: Date the strategy became available (yyyy-MM-dd).
        expiryDate:
          type: string
          format: date
          description: Date the strategy is no longer available (yyyy-MM-dd). Absent means open-ended.
        applicableJurisdictions:
          type: array
          items:
            type: string
            pattern: ^[A-Z]{2}-[A-Z0-9]{1,3}$
            description: ISO 3166-2 jurisdiction code — always country + subdivision (e.g. "US-CA", "US-TX").
          description: 'ISO 3166-2 jurisdiction codes in which the strategy is available.

            When absent the strategy is available in all jurisdictions.'
      required:
      - displayName
      - effectiveDate
      - id
    SurrenderPeriod:
      type: object
      description: A named surrender-charge period associated with a product.
      properties:
        id:
          type: string
          description: Stable identifier referenced by rate payloads.
        period:
          type: string
          pattern: ^(2[0-5]|1[0-9]|[0-9])y$
          description: Duration in years (e.g. "0y", "3y", "10y") up to 25y.
      required:
      - id
      - period
